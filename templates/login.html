{% extends 'base.html' %}

{% block content %}

<div class="form-container">

    <div class="form-box">

        <h1>Login to CivicTrack</h1>

        <p>
            Access your account to register and track complaints.
        </p>

        {% if messages %}

            {% for message in messages %}

                <div class="message">
                    {{ message }}
                </div>

            {% endfor %}

        {% endif %}

        <form method="POST">

            {% csrf_token %}

            <label>
                Username
            </label>

            <input
                type="text"
                name="username"
                required
            >

            <label>
                Password
            </label>

            <input
                type="password"
                name="password"
                required
            >

            <button type="submit">
                Login
            </button>

        </form>

        <p>

            Don't have an account?

            <a href="{% url 'register' %}">
                Register Here
            </a>

        </p>

    </div>

</div>

{% endblock %}
